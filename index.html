<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Images Neural Net</title>
    <link rel="stylesheet" href="dist/index.css">
</head>
<body>


<div class="TrainContainer">
    <img id="input" src="dist/assets/input.png" class="Container" width="600" height="400">
    <img id="output" src="dist/assets/output.png" class="Container" width="600" height="400">
</div>
<div class="Controlls">
    <button id="start_train">Start Learning</button>
    <input id="input_url" placeholder="Enter Image Url">
    <span id="iterations">Iteration: 0</span>
    <input id="drop_gray" type="checkbox" checked="checked"> Drop gray
</div>
<div class="TrainContainer">
    <img id="test" src="https://avatars.mds.yandex.net/get-pdb/38069/9fe2dd95-556d-4fb0-bc26-dd9a53cf94ae/s1200?webp=false" class="Container" width="600" height="400" crossorigin="anonymous" onerror="this.onerror=null;this.src='dist/assets/test.png';">
    <canvas id="result" width="600" height="400" class="Container"></canvas>
</div>
<script src="dist/index.js"></script>
</body>
</html>
